name: NSE OI Scanner

on:
  schedule:
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run scanner
        env:
          RUN_ONCE: "true"
        run: python full_telegram_alerts.py
