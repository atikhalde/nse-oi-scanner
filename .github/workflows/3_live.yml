name: "3. LIVE — paper test (market hours)"
on:
  workflow_dispatch:
  schedule:
    # 09:10–15:30 IST = 03:40–10:00 UTC, every 5 min, weekdays
    - cron: "40-59/5 3 * * 1-5"
    - cron: "*/5 4-9 * * 1-5"
    - cron: "0-5/5 10 * * 1-5"

permissions:
  contents: write

concurrency:
  group: live-paper
  cancel-in-progress: false   # never cancel mid-trade-cycle; queue instead

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DHAN_TOKEN: ${{ secrets.DHAN_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python live_runner.py --live
      - name: commit state + reports
        run: |
          git config user.name "paper-bot"
          git config user.email "paper-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "cycle $(date -u +%F_%H%M)Z"
          git pull --rebase || true
          git push
