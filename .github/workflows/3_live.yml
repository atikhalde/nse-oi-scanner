name: "3. LIVE — paper test (market hours)"
on:
  workflow_dispatch:
  schedule:
    # Every 15 min in market window 09:15–15:30 IST (03:45–10:00 UTC), weekdays.
    # Each run internally does 2 full cycles (~16 min), so even a dropped/delayed
    # cron tick leaves coverage via the neighbouring run. High-frequency crons
    # get deprioritized by GitHub; 15-min cadence is much more reliable.
    - cron: "45-59/15 3 * * 1-5"
    - cron: "*/15 4-9 * * 1-5"
    - cron: "0/15 10 * * 1-5"

permissions:
  contents: write

concurrency:
  group: live-paper
  cancel-in-progress: false   # never cancel mid-trade-cycle; queue instead

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DHAN_TOKEN: ${{ secrets.DHAN_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -u live_runner.py --live --loop 2
      - name: commit state + reports
        run: |
          git config user.name "paper-bot"
          git config user.email "paper-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "cycle $(date -u +%F_%H%M)Z"
          git pull --rebase || true
          git push
