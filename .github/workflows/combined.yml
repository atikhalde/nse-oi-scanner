name: Combined NSE OI Scanner (Alerts + OI + F&O Paper Trading)

on:
  schedule:
    # GitHub Actions cron runs in **UTC** (NOT IST)
    # Indian market = 09:15–15:30 IST
    # 09:15 IST = ~03:45 UTC
    # 15:30 IST = ~10:00 UTC
    #
    # Current schedule: every 5 minutes from 03:00 to 11:59 UTC
    # This safely covers full market + a buffer on both sides.
    #
    # IMPORTANT:
    # - GitHub scheduler can be delayed 5-30+ minutes (especially Monday mornings)
    # - Scripts have internal time guards and will exit cleanly if outside hours
    # - You may still need to manually trigger via "Run workflow" occasionally
    - cron: '*/5 3-12 * * 1-5'
  workflow_dispatch:

jobs:
  alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Alert-Only Scanner
        env:
          RUN_ONCE: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python full_telegram_alerts.py

  paper-trader-oi-fo:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Paper Trader (OI + F&O + Indicator)
        env:
          RUN_ONCE: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python paper_trader_oi_fo.py

      - name: Upload Excel Report (OI+F&O)
        if: hashFiles('Paper_Trades_Report_OI_FO.xlsx') != ''
        uses: actions/upload-artifact@v4
        with:
          name: Paper_Trades_Report_OI_FO
          path: Paper_Trades_Report_OI_FO.xlsx
          retention-days: 14

  paper-trader-original:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Original Paper Trader
        env:
          RUN_ONCE: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python paper_trader.py

      - name: Upload Excel Report (Original)
        if: hashFiles('Paper_Trades_Report.xlsx') != ''
        uses: actions/upload-artifact@v4
        with:
          name: Paper_Trades_Report_Original
          path: Paper_Trades_Report.xlsx
          retention-days: 7
