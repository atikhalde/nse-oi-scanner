name: Combined NSE OI Scanner (Alerts + OI + F&O Paper Trading)

on:
  schedule:
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch:

# ============================================================
# NODE 20 → 24 + NO "No files were found" MESSAGES
# ============================================================
#
# Banner (normal, GitHub prints it):
#   "Node 20 is being deprecated. This workflow is running with Node 24 by default."
#
# We prevent the "No files were found..." message completely
# by using `if: hashFiles(...) != ''` — the upload-artifact step is skipped entirely if the file doesn't exist.
#
# Applied:
# - FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# - checkout@v7 + setup-python@v6
# ============================================================

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: --no-deprecation

jobs:
  alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: --no-deprecation
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Alert-Only Scanner
        env:
          RUN_ONCE: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python full_telegram_alerts.py

  paper-trader-oi-fo:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: --no-deprecation
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Paper Trader (OI + F&O + Indicator)
        env:
          RUN_ONCE: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python paper_trader_oi_fo.py

      # Only runs the upload action if the file actually exists
      # → completely avoids "No files were found..." message
      - name: Upload Excel Report (OI+F&O)
        if: hashFiles('Paper_Trades_Report_OI_FO.xlsx') != ''
        uses: actions/upload-artifact@v4
        with:
          name: Paper_Trades_Report_OI_FO
          path: Paper_Trades_Report_OI_FO.xlsx
          retention-days: 14

  paper-trader-original:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: --no-deprecation
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Original Paper Trader
        env:
          RUN_ONCE: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python paper_trader.py

      - name: Upload Excel Report (Original)
        if: hashFiles('Paper_Trades_Report.xlsx') != ''
        uses: actions/upload-artifact@v4
        with:
          name: Paper_Trades_Report_Original
          path: Paper_Trades_Report.xlsx
          retention-days: 7
