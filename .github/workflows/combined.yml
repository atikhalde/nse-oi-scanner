name: Combined NSE OI Scanner (Alerts + OI + F&O Paper Trading)

on:
  schedule:
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch:

# ======================================================
# NODE 20 → 24 TRANSITION WARNINGS (NORMAL BEHAVIOR)
# ======================================================
# 1. This message appears on EVERY run (harmless):
#    "Node 20 is being deprecated. This workflow is running with Node 24 by default."
#    → GitHub prints this automatically. Cannot be suppressed.
#
# 2. The [DEP0040] punycode warning during upload-artifact etc.
#    → We suppress it below with NODE_OPTIONS.
#
# Both are expected during the transition period and do not affect functionality.
# ======================================================

jobs:
  alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      NODE_OPTIONS: --no-deprecation
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Alert-Only Scanner
        env:
          RUN_ONCE: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python full_telegram_alerts.py

  paper-trader-oi-fo:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_OPTIONS: --no-deprecation
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Paper Trader (OI + F&O + Indicator)
        env:
          RUN_ONCE: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python paper_trader_oi_fo.py
      - name: Upload Excel Report (OI+F&O)
        if: always()
        env:
          NODE_OPTIONS: --no-deprecation
        uses: actions/upload-artifact@v4
        with:
          name: Paper_Trades_Report_OI_FO
          path: Paper_Trades_Report_OI_FO.xlsx
          retention-days: 14
          if-no-files-found: ignore

  paper-trader-original:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_OPTIONS: --no-deprecation
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Original Paper Trader
        env:
          RUN_ONCE: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python paper_trader.py
      - name: Upload Excel Report (Original)
        if: always()
        env:
          NODE_OPTIONS: --no-deprecation
        uses: actions/upload-artifact@v4
        with:
          name: Paper_Trades_Report_Original
          path: Paper_Trades_Report.xlsx
          retention-days: 7
          if-no-files-found: ignore
