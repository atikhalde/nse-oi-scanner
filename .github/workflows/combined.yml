name: Combined NSE OI Scanner (Alerts + OI + F&O Paper Trading)

on:
  schedule:
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch:

# ============================================================
# FIX: "Node 20 ... being forced to run on Node.js 24"
# ============================================================
#
# This exact warning appears when:
# - The runner is on Node 24
# - The actions (checkout@v4, setup-python@v5, upload-artifact@v4)
#   were built for Node 20
#
# Official recommended fix (from GitHub's own deprecation blog):
#   Set ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION=true
#
# This tells GitHub to allow the actions to use their preferred (Node 20) version
# instead of forcing Node 24 on them.
#
# This file now uses the official recommended variable.
# ============================================================

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Alert-Only Scanner
        env:
          RUN_ONCE: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python full_telegram_alerts.py

  paper-trader-oi-fo:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Paper Trader (OI + F&O + Indicator)
        env:
          RUN_ONCE: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python paper_trader_oi_fo.py
      - name: Upload Excel Report (OI+F&O)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Paper_Trades_Report_OI_FO
          path: Paper_Trades_Report_OI_FO.xlsx
          retention-days: 14
          if-no-files-found: ignore

  paper-trader-original:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Original Paper Trader
        env:
          RUN_ONCE: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python paper_trader.py
      - name: Upload Excel Report (Original)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Paper_Trades_Report_Original
          path: Paper_Trades_Report.xlsx
          retention-days: 7
          if-no-files-found: ignore
