name: Combined NSE OI Scanner (Alerts + OI + F&O Paper Trading)

on:
  schedule:
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch:

# ============================================================
# NODE 20 → 24 TRANSITION (CLEANEST POSSIBLE - July 2026)
# ============================================================
#
# What you are seeing in logs:
#
# 1. "Node 20 is being deprecated. This workflow is running with Node 24 by default."
#    → This is GitHub's standard informational message. It appears on EVERY run now.
#    It cannot be fully suppressed.
#
# 2. (node:xxxx) [DEP0040] DeprecationWarning: The `punycode` module is deprecated.
#    → Comes from inside actions/upload-artifact@v4 (even on Node 24).
#    We suppress it as much as possible with NODE_OPTIONS.
#
# 3. "No files were found with the provided path: Paper_Trades_Report_....xlsx"
#    → Normal on weekends / when no trades were generated.
#    We use `if: always()` + `if-no-files-found: ignore`
#
# Fixes applied in this file:
#   ✅ FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true (official opt-in)
#   ✅ NODE_OPTIONS: --no-deprecation (hides punycode)
#   ✅ checkout@v7 + setup-python@v6 (Node 24 native)
# ============================================================

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: --no-deprecation

jobs:
  alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: --no-deprecation
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Alert-Only Scanner
        env:
          RUN_ONCE: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python full_telegram_alerts.py

  paper-trader-oi-fo:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: --no-deprecation
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Paper Trader (OI + F&O + Indicator)
        env:
          RUN_ONCE: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python paper_trader_oi_fo.py
      - name: Upload Excel Report (OI+F&O)
        if: always()
        env:
          NODE_OPTIONS: --no-deprecation
        uses: actions/upload-artifact@v4
        with:
          name: Paper_Trades_Report_OI_FO
          path: Paper_Trades_Report_OI_FO.xlsx
          retention-days: 14
          if-no-files-found: ignore

  paper-trader-original:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: --no-deprecation
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Original Paper Trader
        env:
          RUN_ONCE: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python paper_trader.py
      - name: Upload Excel Report (Original)
        if: always()
        env:
          NODE_OPTIONS: --no-deprecation
        uses: actions/upload-artifact@v4
        with:
          name: Paper_Trades_Report_Original
          path: Paper_Trades_Report.xlsx
          retention-days: 7
          if-no-files-found: ignore
