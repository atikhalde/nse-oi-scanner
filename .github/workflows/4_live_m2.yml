name: "4. LIVE M2 — master × (all OI-spurts) × F&O movers top-20"
on:
  workflow_dispatch:          # also driven by cron-job.org every 15 min (scheduler-proof)
  schedule:
    # backup ticker only: 09:15–15:30 IST (03:45–10:00 UTC), weekdays
    - cron: "45-59/15 3 * * 1-5"
    - cron: "*/15 4-9 * * 1-5"
    - cron: "0/15 10 * * 1-5"

permissions:
  contents: write

concurrency:
  group: live-paper-m2
  cancel-in-progress: false   # never cancel mid-trade-cycle; queue instead

jobs:
  live-m2:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DHAN_TOKEN: ${{ secrets.DHAN_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -u m2_runner.py --loop 2
      - name: commit state + reports
        run: |
          git config user.name "paper-bot"
          git config user.email "paper-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "m2cycle $(date -u +%F_%H%M)Z"
          git pull --rebase || true
          git push
